<div class="jimu-widget-routeplanner">
  <div class="rp-loading-overlay" data-dojo-attach-point="loadingOverlayNode"><span data-dojo-attach-point="loadingTextNode">Working&hellip;</span></div>
  <div class="rp-scroll" data-dojo-attach-point="scrollNode">

    <div class="rp-status" data-dojo-attach-point="routesStatusNode">Loading Routes layer&hellip;</div>
    <div class="rp-status" data-dojo-attach-point="waypointsStatusNode">Loading Waypoints layer&hellip;</div>

    <div class="rp-section">
      <div class="rp-field">
        <label>Departure (A)</label>
        <div class="rp-combo">
          <input type="text" class="rp-combo-input" data-dojo-attach-point="depInput" data-dojo-attach-event="onclick:_onDepInputClick,onkeyup:_onDepInputKeyUp" placeholder="Load waypoints first..." autocomplete="off" disabled />
          <div class="rp-combo-list" data-dojo-attach-point="depList"></div>
        </div>
      </div>

      <div class="rp-field">
        <label>Arrival (B)</label>
        <div class="rp-combo">
          <input type="text" class="rp-combo-input" data-dojo-attach-point="arrInput" data-dojo-attach-event="onclick:_onArrInputClick,onkeyup:_onArrInputKeyUp" placeholder="Load waypoints first..." autocomplete="off" disabled />
          <div class="rp-combo-list" data-dojo-attach-point="arrList"></div>
        </div>
      </div>

      <div class="rp-field">
        <label>Waypoint Snap Distance (meters)</label>
        <input type="number" class="rp-number-input" data-dojo-attach-point="toleranceInput" min="10" max="5000" step="50" />
        <div class="rp-hint" data-dojo-attach-point="toleranceHintNode"></div>
      </div>

      <div class="rp-field">
        <label>Average Speed (km/h)</label>
        <input type="number" class="rp-number-input" data-dojo-attach-point="speedInput" min="1" step="1" />
      </div>

      <div class="rp-btn-row">
        <button class="rp-btn rp-btn-primary" data-dojo-attach-point="calcBtn" disabled>Calculate Route</button>
        <button class="rp-btn rp-btn-secondary" data-dojo-attach-point="resetBtn">Reset</button>
      </div>
    </div>

    <div class="rp-section" data-dojo-attach-point="summaryNode" style="display:none;"></div>

    <div class="rp-section" data-dojo-attach-point="optionsNode" style="display:none;"></div>

    <div class="rp-section" data-dojo-attach-point="schematicSection" style="display:none;">
      <div class="rp-section-title">Schematic Diagram</div>
      <div class="rp-schematic" data-dojo-attach-point="schematicNode"></div>
    </div>

    <div class="rp-section">
      <div class="rp-table-header">
        <span class="rp-section-title">Route Manifest</span>
        <button class="rp-btn rp-btn-secondary rp-btn-sm" data-dojo-attach-point="exportBtn" disabled>Export CSV</button>
      </div>
      <div class="rp-table-wrap">
        <table class="rp-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Type</th>
              <th>Waypoint / Segment</th>
              <th>Out Leg</th>
              <th>Out Cum</th>
              <th>Time to Reach</th>
              <th>Ret Leg</th>
              <th>Ret Cum</th>
              <th>Return Time</th>
            </tr>
          </thead>
          <tbody data-dojo-attach-point="tableBody">
            <tr><td colspan="9" class="rp-empty-row">Calculate a route to view the manifest.</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>
